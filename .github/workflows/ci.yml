# ─────────────────────────────────────────────────────────────────────────────
# CI — runs on every push to main and every pull-request targeting main.
#
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.github/workflows/release.yml'
      - '.github/workflows/deploy-wasm.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

# Cancel redundant in-progress runs for the same branch/PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true

jobs:
  test:
    name: Test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore tests/AsyncNavigation.Tests

      - name: Test
        run: >
          dotnet test tests/AsyncNavigation.Tests
          --configuration Release
          --no-restore
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=results.trx"
          --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()              # upload even when tests fail so we can inspect
        with:
          name: test-results-${{ matrix.os }}
          path: ./test-results/results.trx
          if-no-files-found: warn

  build-libs:
    name: Build Libraries
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Build Core
        run: dotnet build src/AsyncNavigation --configuration Release

      - name: Build Avalonia adapter
        run: dotnet build src/AsyncNavigation.Avalonia --configuration Release

  build-wpf:
    name: Build WPF Library
    runs-on: windows-latest
    needs: test

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Build WPF adapter
        run: dotnet build src/AsyncNavigation.Wpf --configuration Release

  build-samples-desktop&wasm:
    name: Samples / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Avalonia Desktop (Ubuntu)
            os: ubuntu-latest
            project: samples/Sample.Avalonia.Desktop
          - name: Avalonia Desktop (Windows)
            os: windows-latest
            project: samples/Sample.Avalonia.Desktop
          - name: Avalonia Desktop (macOS)
            os: macos-latest
            project: samples/Sample.Avalonia.Desktop
          - name: WPF
            os: windows-latest
            project: samples/Sample.Wpf
          - name: Avalonia Browser (WASM)
            os: ubuntu-latest
            project: samples/Sample.Avalonia.Browser
            wasm: true

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Install WASM workload
        if: matrix.wasm == true
        run: dotnet workload install wasm-tools

      - name: Restore
        run: dotnet restore ${{ matrix.project }}

      - name: Build ${{ matrix.name }}
        run: dotnet build ${{ matrix.project }} --configuration Release

  build-samples-mobile:
    name: Mobile / ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    needs: test

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Android
            os: ubuntu-latest
            project: samples/Sample.Avalonia.Android

          - platform: iOS
            os: macos-latest
            project: samples/Sample.Avalonia.iOS

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Install Android workload
        if: matrix.platform == 'Android'
        run: dotnet workload install android

      - name: Install iOS workload
        if: matrix.platform == 'iOS'
        run: dotnet workload install ios

      - name: Restore
        run: dotnet restore ${{ matrix.project }}

      - name: Build Android
        if: matrix.platform == 'Android'
        run: >
          dotnet build ${{ matrix.project }}
          --configuration Release
          /p:AndroidSdkDirectory=$ANDROID_HOME

      - name: Build iOS (no signing)
        if: matrix.platform == 'iOS'
        run: >
          dotnet build ${{ matrix.project }}
          --configuration Release
          /p:BuildIpa=false
  pack:
    name: Pack NuGet (preview)
    runs-on: ubuntu-latest
    needs: [build-libs, build-wpf]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Pack Core + Avalonia
        run: |
          dotnet pack src/AsyncNavigation         --configuration Release -o ./nugets
          dotnet pack src/AsyncNavigation.Avalonia --configuration Release -o ./nugets

      - name: Upload preview packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-preview
          path: ./nugets/*.nupkg
          if-no-files-found: error
