# ─────────────────────────────────────────────────────────────────────────────
# Release — manual trigger.
#
# Inputs:
#   version        Semver without 'v' prefix (e.g. 2.0.0 or 2.0.0-beta)
#   release_notes  Markdown body for the GitHub Release
#   prerelease     Mark the GitHub Release as pre-release
#
# Pipeline stages:
#   1. tag            Create and push the git tag
#   2. test           Run unit tests on Linux / Windows / macOS
#   3. pack           Build & pack NuGet packages with the given version
#   4. publish-core   Publish AsyncNavigation to NuGet.org
#   5. publish-libs   Publish Avalonia & WPF adapters (waits for Core to index)
#   6. github-release Create GitHub Release with release notes + .nupkg files
#   7. deploy-wasm    Deploy the WASM sample to GitHub Pages
#
# Required secrets:
#   NUGET_API_KEY  — NuGet.org API key
#
# Required repository permissions:
#   Settings → Actions → Workflow permissions → "Read and write permissions"
# ─────────────────────────────────────────────────────────────────────────────
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 2.0.0 or 2.0.0-beta)'
        required: true
        type: string
      release_notes:
        description: 'Release notes (markdown)'
        required: false
        type: string
      prerelease:
        description: 'Pre-release'
        required: false
        default: false
        type: boolean

# Only one release can run at a time.
concurrency:
  group: release
  cancel-in-progress: false

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  WASM_PROJECT: samples/Sample.Avalonia.Browser/Sample.Avalonia.Browser.csproj
  WASM_PUBLISH_DIR: samples/Sample.Avalonia.Browser/bin/Release/net10.0-browser/publish/wwwroot

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Stage 1 – Create and push the git tag
  # ──────────────────────────────────────────────────────────────────────────
  tag:
    name: Create Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ inputs.version }}
          git push origin v${{ inputs.version }}

  # ──────────────────────────────────────────────────────────────────────────
  # Stage 2 – Tests (gate: nothing is published if tests fail)
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: tag
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore tests/AsyncNavigation.Tests

      - name: Test
        run: >
          dotnet test tests/AsyncNavigation.Tests
          --configuration Release
          --no-restore
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=results.trx"
          --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-test-results-${{ matrix.os }}
          path: ./test-results/results.trx
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────────────────
  # Stage 3a – Pack Core + Avalonia (Linux)
  # ──────────────────────────────────────────────────────────────────────────
  pack-linux:
    name: Pack Core + Avalonia
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Pack Core
        run: >
          dotnet pack src/AsyncNavigation
          --configuration Release
          -p:Version=${{ inputs.version }}
          -o ./nugets

      - name: Pack Avalonia adapter
        run: >
          dotnet pack src/AsyncNavigation.Avalonia
          --configuration Release
          -p:Version=${{ inputs.version }}
          -o ./nugets

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-linux
          path: ./nugets/*.nupkg
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  # Stage 3b – Pack WPF adapter (requires Windows)
  # ──────────────────────────────────────────────────────────────────────────
  pack-wpf:
    name: Pack WPF
    runs-on: windows-latest
    needs: test

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Pack WPF adapter
        run: >
          dotnet pack src/AsyncNavigation.Wpf
          --configuration Release
          -p:Version=${{ inputs.version }}
          -o ./nugets

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-wpf
          path: ./nugets/*.nupkg
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  # Stage 4 – Publish Core to NuGet.org
  # ──────────────────────────────────────────────────────────────────────────
  publish-core:
    name: Publish Core to NuGet.org
    runs-on: ubuntu-latest
    needs: [pack-linux, pack-wpf]

    steps:
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download Core + Avalonia packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-linux
          path: ./nugets

      - name: Publish AsyncNavigation (Core)
        run: >
          dotnet nuget push "./nugets/AsyncNavigation.${{ inputs.version }}.nupkg"
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

  # ──────────────────────────────────────────────────────────────────────────
  # Stage 5 – Publish Avalonia and WPF (after Core is indexed on NuGet.org)
  # Polls the NuGet flat-container API so we don't rely on a fixed sleep.
  # ──────────────────────────────────────────────────────────────────────────
  publish-avalonia:
    name: Publish Avalonia to NuGet.org
    runs-on: ubuntu-latest
    needs: [pack-linux, publish-core]

    steps:
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download Core + Avalonia packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-linux
          path: ./nugets

      - name: Wait for Core to be indexed
        env:
          VERSION: ${{ inputs.version }}
        run: |
          URL="https://api.nuget.org/v3-flatcontainer/asyncnavigation/${VERSION}/asyncnavigation.${VERSION}.nupkg"
          echo "Polling: $URL"
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "AsyncNavigation $VERSION is indexed (attempt $i)."
              break
            fi
            echo "Attempt $i/20 — HTTP $STATUS, retrying in 30s…"
            sleep 30
          done
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          if [ "$STATUS" != "200" ]; then
            echo "AsyncNavigation $VERSION was not indexed within the timeout."
            exit 1
          fi

      - name: Publish AsyncNavigation.Avalonia
        run: >
          dotnet nuget push "./nugets/AsyncNavigation.Avalonia.${{ inputs.version }}.nupkg"
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

  publish-wpf:
    name: Publish WPF to NuGet.org
    runs-on: ubuntu-latest
    needs: [pack-linux, pack-wpf, publish-core]

    steps:
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download WPF packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-wpf
          path: ./nugets

      - name: Wait for Core to be indexed
        env:
          VERSION: ${{ inputs.version }}
        run: |
          URL="https://api.nuget.org/v3-flatcontainer/asyncnavigation/${VERSION}/asyncnavigation.${VERSION}.nupkg"
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "Core $VERSION indexed (attempt $i)."
              break
            fi
            echo "Attempt $i/20 — HTTP $STATUS, retrying in 30s…"
            sleep 30
          done

      - name: Publish AsyncNavigation.Wpf
        run: >
          dotnet nuget push "./nugets/AsyncNavigation.Wpf.${{ inputs.version }}.nupkg"
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

  # ──────────────────────────────────────────────────────────────────────────
  # Stage 6 – Create GitHub Release with attached .nupkg files
  # ──────────────────────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [pack-linux, pack-wpf, publish-avalonia, publish-wpf]
    permissions:
      contents: write

    steps:
      - name: Download Core + Avalonia packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-linux
          path: ./release-assets

      - name: Download WPF packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-wpf
          path: ./release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body: ${{ inputs.release_notes }}
          prerelease: ${{ inputs.prerelease }}
          files: ./release-assets/*.nupkg
          fail_on_unmatched_files: true

  # ──────────────────────────────────────────────────────────────────────────
  # Stage 7 – Deploy WASM sample to GitHub Pages
  # ──────────────────────────────────────────────────────────────────────────
  deploy-wasm:
    name: Deploy WASM Sample
    runs-on: ubuntu-latest
    needs: github-release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Publish WASM
        run: dotnet publish ${{ env.WASM_PROJECT }} --configuration Release --nologo

      - name: Prepare for GitHub Pages (SPA routing support)
        run: |
          cp ${{ env.WASM_PUBLISH_DIR }}/index.html ${{ env.WASM_PUBLISH_DIR }}/404.html
          touch ${{ env.WASM_PUBLISH_DIR }}/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: page-samplewasm
          folder: ${{ env.WASM_PUBLISH_DIR }}
          single-commit: true
          token: ${{ secrets.GITHUB_TOKEN }}
