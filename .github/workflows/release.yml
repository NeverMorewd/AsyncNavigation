# ─────────────────────────────────────────────────────────────────────────────
# Release — triggered by pushing a semver tag (e.g. v1.2.3 or v1.2.3-beta.1).
#
# Pipeline stages:
#   1. test             Re-run unit tests against the tagged commit
#   2. pack             Build & pack all NuGet packages with the tag version
#   3. publish-core     Publish AsyncNavigation to NuGet.org
#   4. publish-libs     Publish Avalonia & WPF adapters (after Core is indexed)
#   5. github-release   Create GitHub Release with changelog + attached .nupkg
#   6. deploy-wasm      Publish the WASM sample to GitHub Pages
#
# Required secrets:
#   NUGET_API_KEY  — NuGet.org API key (rename from the old GLOBALKEY secret)
#
# Required repository permissions:
#   Settings → Actions → Workflow permissions → "Read and write permissions"
# ─────────────────────────────────────────────────────────────────────────────
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'        # stable:     v1.2.3
      - 'v[0-9]+.[0-9]+.[0-9]+-*'      # pre-release: v1.2.3-beta.1

# Only one release can run at a time.
concurrency:
  group: release
  cancel-in-progress: false

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  WASM_PROJECT: samples/Sample.Avalonia.Browser/Sample.Avalonia.Browser.csproj
  WASM_PUBLISH_DIR: samples/Sample.Avalonia.Browser/bin/Release/net10.0-browser/publish/wwwroot

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Stage 1 – Tests (gate: nothing is published if tests fail)
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true           # fail the release immediately if any OS fails
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore tests/AsyncNavigation.Tests

      - name: Test
        run: >
          dotnet test tests/AsyncNavigation.Tests
          --configuration Release
          --no-restore
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=results.trx"
          --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-test-results-${{ matrix.os }}
          path: ./test-results/results.trx
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────────────────
  # Stage 2a – Pack Core + Avalonia (Linux)
  # ──────────────────────────────────────────────────────────────────────────
  pack-linux:
    name: Pack Core + Avalonia
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        # Strip the leading 'v': v1.2.3 → 1.2.3
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Pack Core
        run: >
          dotnet pack src/AsyncNavigation
          --configuration Release
          -p:Version=${{ steps.version.outputs.value }}
          -o ./nugets

      - name: Pack Avalonia adapter
        run: >
          dotnet pack src/AsyncNavigation.Avalonia
          --configuration Release
          -p:Version=${{ steps.version.outputs.value }}
          -o ./nugets

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-linux
          path: ./nugets/*.nupkg
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  # Stage 2b – Pack WPF adapter (requires Windows)
  # ──────────────────────────────────────────────────────────────────────────
  pack-wpf:
    name: Pack WPF
    runs-on: windows-latest
    needs: test
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Pack WPF adapter
        run: >
          dotnet pack src/AsyncNavigation.Wpf
          --configuration Release
          -p:Version=${{ steps.version.outputs.value }}
          -o ./nugets

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-wpf
          path: ./nugets/*.nupkg
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  # Stage 3 – Publish Core to NuGet.org
  # ──────────────────────────────────────────────────────────────────────────
  publish-core:
    name: Publish Core to NuGet.org
    runs-on: ubuntu-latest
    needs: [pack-linux, pack-wpf]

    steps:
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download Core + Avalonia packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-linux
          path: ./nugets

      - name: Publish AsyncNavigation (Core)
        run: >
          dotnet nuget push "./nugets/AsyncNavigation.${{ needs.pack-linux.outputs.version }}.nupkg"
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

  # ──────────────────────────────────────────────────────────────────────────
  # Stage 4 – Publish Avalonia and WPF (after Core is indexed on NuGet.org)
  # Polls the NuGet flat-container API so we don't rely on a fixed sleep.
  # ──────────────────────────────────────────────────────────────────────────
  publish-avalonia:
    name: Publish Avalonia to NuGet.org
    runs-on: ubuntu-latest
    needs: [pack-linux, publish-core]

    steps:
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download Core + Avalonia packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-linux
          path: ./nugets

      # Wait until Core is queryable before publishing Avalonia so that
      # downstream consumers can restore the full dependency graph immediately.
      - name: Wait for Core to be indexed
        env:
          VERSION: ${{ needs.pack-linux.outputs.version }}
        run: |
          URL="https://api.nuget.org/v3-flatcontainer/asyncnavigation/${VERSION}/asyncnavigation.${VERSION}.nupkg"
          echo "Polling: $URL"
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "✓ AsyncNavigation $VERSION is indexed (attempt $i)."
              break
            fi
            echo "Attempt $i/20 — HTTP $STATUS, retrying in 30s…"
            sleep 30
          done
          # Final check — fail the job if still not available after 10 minutes
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          if [ "$STATUS" != "200" ]; then
            echo "✗ AsyncNavigation $VERSION was not indexed within the timeout."
            exit 1
          fi

      - name: Publish AsyncNavigation.Avalonia
        run: >
          dotnet nuget push "./nugets/AsyncNavigation.Avalonia.${{ needs.pack-linux.outputs.version }}.nupkg"
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

  publish-wpf:
    name: Publish WPF to NuGet.org
    runs-on: ubuntu-latest
    needs: [pack-linux, pack-wpf, publish-core]

    steps:
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download WPF packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-wpf
          path: ./nugets

      - name: Wait for Core to be indexed
        env:
          VERSION: ${{ needs.pack-linux.outputs.version }}
        run: |
          URL="https://api.nuget.org/v3-flatcontainer/asyncnavigation/${VERSION}/asyncnavigation.${VERSION}.nupkg"
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Core $VERSION indexed (attempt $i)."
              break
            fi
            echo "Attempt $i/20 — HTTP $STATUS, retrying in 30s…"
            sleep 30
          done

      - name: Publish AsyncNavigation.Wpf
        run: >
          dotnet nuget push "./nugets/AsyncNavigation.Wpf.${{ needs.pack-wpf.outputs.version }}.nupkg"
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

  # ──────────────────────────────────────────────────────────────────────────
  # Stage 5 – Create GitHub Release with attached .nupkg files and auto-changelog
  # ──────────────────────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [pack-linux, pack-wpf, publish-avalonia, publish-wpf]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0          # full history for changelog generation

      - name: Download Core + Avalonia packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-linux
          path: ./release-assets

      - name: Download WPF packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-wpf
          path: ./release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true    # auto-changelog from merged PRs
          prerelease: ${{ contains(github.ref_name, '-') }}   # v1.2.3-beta.1 → pre-release
          files: ./release-assets/*.nupkg
          fail_on_unmatched_files: true

  # ──────────────────────────────────────────────────────────────────────────
  # Stage 6 – Deploy WASM sample to GitHub Pages
  # ──────────────────────────────────────────────────────────────────────────
  deploy-wasm:
    name: Deploy WASM Sample
    runs-on: ubuntu-latest
    needs: github-release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Publish WASM
        run: dotnet publish ${{ env.WASM_PROJECT }} --configuration Release --nologo

      - name: Prepare for GitHub Pages (SPA routing support)
        run: |
          cp ${{ env.WASM_PUBLISH_DIR }}/index.html ${{ env.WASM_PUBLISH_DIR }}/404.html
          touch ${{ env.WASM_PUBLISH_DIR }}/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: page-samplewasm
          folder: ${{ env.WASM_PUBLISH_DIR }}
          single-commit: true
          token: ${{ secrets.GITHUB_TOKEN }}
